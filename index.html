<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ljudnedladdare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="url"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #555;
    }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.2rem;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #1e3a6e; cursor: default; opacity: 0.7; }

    .status {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      min-height: 1.5rem;
    }

    .status.idle    { color: #555; }
    .status.working { color: #facc15; }
    .status.done    { color: #4ade80; }
    .status.error   { color: #f87171; }

    .progress-bar {
      margin-top: 0.7rem;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: #2563eb;
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s;
    }

    .progress-bar.indeterminate .fill {
      width: 40%;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      background: #14532d;
      color: #4ade80;
      border: 1px solid #166534;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .download-link:hover { background: #166534; }

    .history {
      margin-top: 1.5rem;
      border-top: 1px solid #2a2a2a;
      padding-top: 1rem;
    }

    .history h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #444;
      margin-bottom: 0.7rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
    }

    .history-item .name {
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }

    .history-item a {
      color: #2563eb;
      text-decoration: none;
      flex-shrink: 0;
    }

    .history-item a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 Ljudnedladdare</h1>
    <p class="subtitle">Klistra in en video-URL för att extrahera ljudet som MP3.</p>

    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://..." />
      <button id="downloadBtn" onclick="startDownload()">Ladda ner</button>
    </div>

    <div class="status idle" id="status">Ange en URL ovan.</div>

    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="fill" id="progressFill"></div>
    </div>

    <div id="downloadLinkContainer"></div>

    <div class="history" id="historySection" style="display:none">
      <h2>Tidigare nedladdningar</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    let pollInterval = null;

    async function startDownload() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;

      setStatus('working', '⏳ Startar jobb...');
      setProgress(true);
      document.getElementById('downloadBtn').disabled = true;
      document.getElementById('downloadLinkContainer').innerHTML = '';

      try {
        const res = await fetch('api/start.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'url=' + encodeURIComponent(url)
        });

        const data = await res.json();

        if (!data.job_id) {
          setStatus('error', '❌ Kunde inte starta jobbet: ' + (data.error || 'okänt fel'));
          resetUI();
          return;
        }

        pollStatus(data.job_id);

      } catch (e) {
        setStatus('error', '❌ Serverfel: ' + e.message);
        resetUI();
      }
    }

    function pollStatus(jobId) {
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch('api/status.php?job_id=' + encodeURIComponent(jobId));
          const data = await res.json();

          if (data.status === 'pending' || data.status === 'running') {
            setStatus('working', '⏳ ' + (data.message || 'Laddar ner...'));
            updateProgress(data.phase, data.progress);

          } else if (data.status === 'done') {
            clearInterval(pollInterval);
            setStatus('done', '✅ Klart! ' + (data.title || ''));
            setProgress(false);
            showDownloadLink(data.file_url, data.filename);
            addToHistory(data.title || data.filename, data.file_url);
            resetUI();

          } else if (data.status === 'error') {
            clearInterval(pollInterval);
            setStatus('error', '❌ Fel: ' + (data.message || 'okänt'));
            setProgress(false);
            resetUI();
          }
        } catch (e) {
          clearInterval(pollInterval);
          setStatus('error', '❌ Kunde inte kontrollera status.');
          setProgress(false);
          resetUI();
        }
      }, 2000);
    }

    function updateProgress(phase, progress) {
      const bar = document.getElementById('progressBar');
      const fill = document.getElementById('progressFill');
      if (phase === 'download' && typeof progress === 'number' && progress > 0) {
        bar.classList.remove('indeterminate');
        fill.style.width = progress + '%';
      } else {
        bar.classList.add('indeterminate');
        fill.style.width = '';
      }
    }

    function showDownloadLink(url, filename) {
      const container = document.getElementById('downloadLinkContainer');
      container.innerHTML = `<a class="download-link" href="${url}" download="${filename}">⬇ Ladda ner MP3</a>`;
    }

    function addToHistory(title, url) {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      section.style.display = 'block';

      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `<span class="name" title="${title}">${title}</span><a href="${url}" download>⬇ MP3</a>`;
      list.prepend(item);
    }

    function setStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }

    function setProgress(active) {
      const bar = document.getElementById('progressBar');
      bar.style.display = active ? 'block' : 'none';
      if (active) {
        bar.classList.add('indeterminate');
      } else {
        bar.classList.remove('indeterminate');
        document.getElementById('progressFill').style.width = '100%';
        setTimeout(() => { bar.style.display = 'none'; }, 600);
      }
    }

    function resetUI() {
      document.getElementById('downloadBtn').disabled = false;
    }
  </script>
</body>
</html>
